name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: tsc + vite build
    # Skip when frontend/ is absent (e.g. on main before PR #15 lands, or on
    # branches that touch only this workflow file). PR #15 merge will populate
    # frontend/ and auto-enable this gate on subsequent pushes.
    if: hashFiles('frontend/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci)
        run: npm ci
      - name: Build (tsc -b && vite build)
        run: npm run build
